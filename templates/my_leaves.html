<!DOCTYPE html>
<html>

<head>
<title>My Leaves</title>
</head>

<body>

<h1>My Leave Requests</h1>

<table border="1">

<tr>

<th>Type</th>

<th>Start</th>

<th>End</th>

<th>Status</th>

</tr>

{% for leave in leaves %}

<tr>

<td>{{ leave.leave_type }}</td>

<td>{{ leave.start_date }}</td>

<td>{{ leave.end_date }}</td>

<td>{{ leave.status }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
